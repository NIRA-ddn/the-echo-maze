<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Echo Vault</title>
    <link rel="icon" type="image/png" href="ECHO.png">

    <style>
        :root {
            --glow-color: #00ff33;
            --bg-color: #050505;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100vh;
            background-color: var(--bg-color); color: var(--glow-color);
            font-family: 'Courier New', Courier, monospace;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden; position: relative; box-sizing: border-box;
        }

        /* CRT MONITOR GRID OVERLAY */
        body::before {
            content: " "; display: block; position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            z-index: 99; background-size: 100% 4px, 4px 100%; pointer-events: none;
        }

        #matrixCanvas {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.45; pointer-events: none;
        }

        /* BOOT TERMINAL OVERLAY */
        #bootTerminal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000; z-index: 100; padding: 45px;
            box-sizing: border-box; display: flex; flex-direction: column;
            justify-content: flex-start; align-items: flex-start; font-size: 16px;
        }
        .boot-line { margin-bottom: 12px; min-height: 22px; font-weight: bold; letter-spacing: 1px; color: var(--glow-color); }

        /* OUTER SCI-FI FRAME */
        .cyber-frame {
            position: fixed; top: 15px; left: 15px; right: 15px; bottom: 15px;
            border: 2px solid rgba(0, 255, 51, 0.4);
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.15), inset 0 0 20px rgba(0, 255, 51, 0.15);
            pointer-events: none; z-index: 10; border-radius: 12px;
        }
        .cyber-corner { position: absolute; width: 30px; height: 30px; border: 4px solid var(--glow-color); }
        .top-left { top: -2px; left: -2px; border-right: none; border-bottom: none; border-top-left-radius: 8px; }
        .top-right { top: -2px; right: -2px; border-left: none; border-bottom: none; border-top-right-radius: 8px; }
        .bottom-left { bottom: -2px; left: -2px; border-right: none; border-top: none; border-bottom-left-radius: 8px; }
        .bottom-right { bottom: -2px; right: -2px; border-left: none; border-top: none; border-bottom-right-radius: 8px; }

        /* MAIN STATIONS CONTAINER */
        .container {
            border: 1px solid rgba(0, 255, 51, 0.3); padding: 30px;
            background-color: rgba(2, 2, 2, 0.94); border-radius: 6px;
            position: relative; z-index: 5; backdrop-filter: blur(8px);
            max-width: 600px; width: 85%; max-height: 85vh;
            overflow-y: auto; text-align: center; box-sizing: border-box;
            box-shadow: 0 0 40px rgba(0, 255, 51, 0.2); display: none;
        }

        .system-hud {
            display: flex; justify-content: space-between; font-size: 11px;
            color: var(--glow-color); margin-bottom: 20px;
            border-bottom: 1px dashed rgba(0, 255, 51, 0.4); padding-bottom: 8px;
        }

        h1 { 
            font-size: 24px; margin-top: 0; margin-bottom: 15px; 
            text-transform: uppercase; letter-spacing: 3px; 
            text-shadow: 0 0 15px var(--glow-color); animation: glitchEffect 4s infinite;
        }

        p.desc-text { font-size: 13px; line-height: 1.5; color: #d1d1d1; margin-bottom: 20px; }
        .puzzle-image { max-width: 180px; width: 100%; height: auto; border: 1px solid var(--glow-color); margin-bottom: 20px; }

        input[type="text"] {
            background-color: #000; border: 1px solid rgba(0, 255, 51, 0.6); color: var(--glow-color);
            padding: 12px; width: 85%; text-align: center; font-size: 15px; outline: none; letter-spacing: 3px;
            font-family: 'Courier New', Courier, monospace;
        }
        input[type="text"]:focus { border-color: var(--glow-color); box-shadow: 0 0 25px rgba(0, 255, 51, 0.4); }

        button, .download-btn {
            background-color: transparent; color: var(--glow-color); border: 1px solid var(--glow-color);
            padding: 12px 35px; font-size: 13px; font-weight: bold; font-family: 'Courier New', Courier, monospace;
            margin-top: 20px; cursor: pointer; text-transform: uppercase; letter-spacing: 2px; transition: all 0.3s ease;
        }
        button:hover, .download-btn:hover { background-color: var(--glow-color); color: #000; box-shadow: 0 0 30px var(--glow-color); }
        .error { color: #ff3333; margin-top: 15px; font-size: 13px; font-weight: bold; text-shadow: 0 0 10px rgba(255, 51, 51, 0.5); }

        /* --- DECRYPTION PROGRESS BAR --- */
        #progressSection { display: none; margin: 20px 0; }
        .progress-container { width: 100%; border: 1px solid var(--glow-color); height: 20px; background: #000; position: relative; }
        .progress-bar { width: 0%; height: 100%; background: var(--glow-color); box-shadow: 0 0 15px var(--glow-color); transition: width 0.1s linear; }
        .progress-text { font-size: 12px; margin-top: 5px; letter-spacing: 2px; }

        /* --- LOCKDOWN SCREEN --- */
        #lockdownSection { display: none; animation: flashRed 0.3s infinite alternate; }
        .lockdown-title { color: #ff3333; font-size: 28px; font-weight: bold; text-shadow: 0 0 20px #ff0000; letter-spacing: 4px; }

        /* --- SUCCESS PANEL & PIXELATED GRID EYE EFFECT --- */
        #downloadSection { display: none; margin-top: 10px; animation: fadeInGlitch 0.6s ease-in-out; }
        .cyber-eye-container {
            position: relative; margin: 15px auto 25px auto;
            max-width: 420px; width: 100%; border: 2px solid var(--glow-color);
            box-shadow: 0 0 35px rgba(0, 255, 51, 0.5); overflow: hidden; background: #000;
            animation: eyeGlitchShake 3s infinite;
        }
        .cyber-eye {
            width: 100%; height: auto; display: block;
            image-rendering: pixelated; image-rendering: crisp-edges;
            filter: grayscale(100%) brightness(1.3) contrast(2.5) sepia(100%) hue-rotate(90deg) saturate(600%);
            mix-blend-mode: screen; opacity: 0.9;
        }
        .grid-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: linear-gradient(rgba(0, 255, 51, 0.3) 1.5px, transparent 1.5px), linear-gradient(90deg, rgba(0, 255, 51, 0.3) 1.5px, transparent 1.5px);
            background-size: 8px 8px; pointer-events: none; z-index: 3;
        }
        .cyber-eye-container::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 8px;
            background: rgba(0, 255, 51, 0.9); box-shadow: 0 0 20px var(--glow-color), 0 0 40px var(--glow-color);
            animation: cyberScan 2s linear infinite; z-index: 4;
        }
        .congrats-text {
            color: #ffffff; font-size: 20px; font-weight: bold; letter-spacing: 4px;
            text-shadow: 0 0 15px #00ff33, 0 0 30px #00ff33; animation: pulseText 1.5s infinite alternate; margin-bottom: 10px;
        }

        .footer { margin-top: 25px; font-size: 12px; color: rgba(0, 255, 51, 0.9); font-
