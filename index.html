<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Echo Vault</title>
    <style>
        /* මුළු පිටුවේම පසුබිම සහ මැට්‍රික්ස් ග්‍රිඩ් එක */
        body {
            background-color: #030303;
            background-image: 
                linear-gradient(rgba(0, 255, 51, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 51, 0.03) 1px, transparent 1px);
            background-size: 20px 20px;
            color: #00ff33;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            text-align: center;
            box-sizing: border-box;
            overflow-x: hidden;
        }

        /* ප්‍රධාන Container එක - Cyber Box design */
        .container {
            border: 1px solid #00ff33;
            padding: 40px 30px;
            background-color: rgba(6, 6, 6, 0.95);
            box-shadow: 0 0 30px rgba(0, 255, 51, 0.15), inset 0 0 15px rgba(0, 255, 51, 0.05);
            max-width: 550px;
            width: 100%;
            box-sizing: border-box;
            border-radius: 4px;
            position: relative;
        }

        /* කොන් හතරේ හැකර් මාර්ක්ස් (Tech Corners) */
        .container::before, .container::after {
            content: '';
            position: absolute;
            width: 12px;
            height: 12px;
            border: 2px solid #00ff33;
        }
        .container::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .container::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        /* NIRA Tech Tag - Box එක ඇතුළේ උඩින්ම පෙනෙන Signature එක */
        .tech-tag {
            text-align: right;
            font-size: 10px;
            letter-spacing: 1px;
            color: rgba(0, 255, 51, 0.6);
            margin-top: -25px;
            margin-bottom: 20px;
            text-transform: uppercase;
        }

        /* මාතෘකාවේ Flicker ඇනිමේෂන් එක */
        h1 { 
            font-size: 24px; 
            margin-top: 0;
            margin-bottom: 20px; 
            text-transform: uppercase; 
            letter-spacing: 3px; 
            text-shadow: 0 0 10px rgba(0, 255, 51, 0.5);
            animation: glitch 3s infinite;
        }

        p { font-size: 13px; line-height: 1.6; color: #a3a3a3; margin-bottom: 25px; letter-spacing: 0.5px; }
        
        /* රූපයේ බෝඩර් සහ ග්ලෝ එක */
        .puzzle-image {
            max-width: 100%;
            height: auto;
            border: 1px solid rgba(0, 255, 51, 0.5);
            margin-bottom: 25px;
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.1);
            border-radius: 2px;
        }

        /* Input බොක්ස් එක - Glow on Focus */
        input[type="text"] {
            background-color: #000;
            border: 1px solid rgba(0, 255, 51, 0.4);
            color: #00ff33;
            padding: 14px;
            width: 85%;
            text-align: center;
            font-size: 15px;
            margin-top: 10px;
            outline: none;
            box-sizing: border-box;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            box-shadow: inset 0 0 5px rgba(0, 255, 51, 0.1);
        }
        input[type="text"]:focus {
            border-color: #00ff33;
            box-shadow: 0 0 15px rgba(0, 255, 51, 0.3), inset 0 0 5px rgba(0, 255, 51, 0.2);
        }

        /* හැකර් ස්ටයිල් බටන්ස් */
        button, .download-btn {
            background-color: transparent;
            color: #00ff33;
            border: 1px solid #00ff33;
            padding: 12px 30px;
            font-size: 14px;
            font-weight: bold;
            font-family: 'Courier New', Courier, monospace;
            margin-top: 25px;
            cursor: pointer;
            text-transform: uppercase;
            display: inline-block;
            text-decoration: none;
            letter-spacing: 2px;
            transition: all 0.3s ease;
            position: relative;
        }
        button:hover, .download-btn:hover { 
            background-color: #00ff33;
            color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 51, 0.4);
        }

        #downloadSection { display: none; margin-top: 30px; border-top: 1px dashed rgba(0, 255, 51, 0.3); padding-top: 25px; }
        .error { color: #ff3333; margin-top: 18px; font-size: 13px; font-weight: bold; letter-spacing: 1px; text-shadow: 0 0 5px rgba(255, 51, 51, 0.3); }

        /* සයිට් එකේ යටම තියෙන Copyright එක */
        .footer {
            margin-top: 25px;
            font-size: 11px;
            color: rgba(0, 255, 51, 0.4);
            letter-spacing: 1px;
        }

        /* ඇනිමේෂන් කෝඩ් */
        @keyframes glitch {
            0%, 100% { opacity: 1; }
            95% { opacity: 1; }
            96% { opacity: 0.8; }
            97% { opacity: 1; }
            98% { opacity: 0.9; }
            99% { opacity: 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <!-- සයිට් එක ඇතුළේ උඩින්ම පෙනෙන NIRA Tag එක -->
    <div class="tech-tag">SYS_STATUS: ACTIVE // BY_NIRA</div>

    <h1>[ Project: ECHO REVEAL ]</h1>
    
    <img src="ECHO.png" alt="Mystery Clue" class="puzzle-image">

    <p>The music holds the truth, but the vault remains locked. Find the hidden answer from the streams to unlock the final archive.</p>
    
    <div id="puzzleSection">
        <form onsubmit="event.preventDefault(); checkPuzzle();">
            <input type="text" id="puzzleInput" placeholder="ENTER THE SECRET WORD HERE..." autocomplete="off">
            <br>
            <button type="submit">Decrypt</button>
        </form>
        <div id="errorMessage" class="error"></div>
    </div>

    <div id="downloadSection">
        <p style="color: #00ff33; font-weight: bold; text-shadow: 0 0 10px rgba(0,255,51,0.4);">ACCESS GRANTED. THE VAULT IS OPENED.</p>
        <a href="https://transfer.it/t/xS2fnnohSJoB" target="_blank" class="download-btn">Download Vault.7z (90MB)</a>
    </div>
</div>

<!-- සයිට් එකේ යටින්ම තියෙන ©NIRA එක -->
<div class="footer">
    © 2026 NIRA. All Rights Reserved.
</div>

<script>
    function checkPuzzle() {
        var userInput = document.getElementById("puzzleInput").value.trim().toLowerCase();
        var errorMessage = document.getElementById("errorMessage");
        var downloadSection = document.getElementById("downloadSection");

        // Inspect කරන එකාට 'dedunu' කියලා පේන්නේ නෑ, පේන්නේ මේ Encrypted කෝඩ් එක විතරයි!
        var secretToken = "ZGVkdW51"; 

        // User ගහන වචනය Encrypt කරලා සසඳනවා
        if (btoa(userInput) === secretToken) {
            errorMessage.innerHTML = "";
            downloadSection.style.display = "block";
            document.getElementById("puzzleSection").style.display = "none";
        } else {
            errorMessage.innerHTML = "ACCESS DENIED: INVALID DECRYPTION KEY.";
            downloadSection.style.display = "none";
        }
    }
</script>

</body>
</html>
